{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nibe-exporter.fullname" . }}-dashboard
  labels:
    {{- include "nibe-exporter.labels" . | nindent 4 }}
    {{- if .Values.grafanaDashboard.labels }}
    {{- toYaml .Values.grafanaDashboard.labels | nindent 4 }}
    {{- end }}
data:
  nibe-exporter-dashboard.json: |
