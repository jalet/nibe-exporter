replicaCount: 1

image:
  repository: ghcr.io/jalet/nibe-exporter
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []

nameOverride: ''
fullnameOverride: ''

serviceAccount:
  create: true
  annotations: {}
  name: ''

podAnnotations:
  prometheus.io/scrape: 'true'
  prometheus.io/port: '9090'
  prometheus.io/path: '/metrics'

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80
  targetPort: 9090
  annotations: {}

ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts:
    - host: nibe.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# myUplink configuration
myuplink:
  clientId: ''
  clientSecret: ''
  clientSecretRef:
    name: ''
    key: 'client-secret'
  apiVersion: 'v2'
  deviceId: ''

# Exporter configuration
exporter:
  logLevel: info
  logJson: false
  pollInterval: 60
  listenAddr: '0.0.0.0:9090'

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: false
  namespace: ''
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  honorLabels: false

# Prometheus PrometheusRule
prometheusRule:
  enabled: false
  namespace: ''
  labels: {}

# NetworkPolicy
networkPolicy:
  enabled: false
  ingress: []
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

# Cilium NetworkPolicy
ciliumNetworkPolicy:
  enabled: false

# Grafana Dashboard
grafanaDashboard:
  enabled: false
  labels: {}
